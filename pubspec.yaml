name: silver_worker_now
description: "나갈준비 알리미 - 사용자의 준비 루틴을 역산하여 지각을 방지하는 서비스"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  intl: ^0.20.2
  flutter_riverpod: ^2.4.9
  logger: ^2.0.2
  flutter_slidable: ^3.0.1
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  flutter_timezone: ^3.0.1
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.0

flutter:
  generate: true
  uses-material-design: true
