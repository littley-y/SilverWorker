name: Flutter Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: android-release
            build_command: flutter build apk --release --split-per-abi
            output_path: build/app/outputs/flutter-apk/app-release.apk
          - os: windows-latest
            artifact_name: windows-release
            build_command: flutter build windows --release
            output_path: build/windows/runner/Release/silver_worker_now.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (for Android)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build
        run: ${{ matrix.build_command }}

      - name: Rename Android APK (Optional)
        if: matrix.os == 'ubuntu-latest'
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/SilverWorkerNow-v${{ github.ref_name }}.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/windows/runner/Release/*

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/android-release/*.apk
            ./artifacts/windows-release/*.exe
          body: |
            ## Must Go Out Now - ${{ github.ref_name }}
            
            자동화된 릴리즈 빌드입니다.
            - Android APK (Split-per-abi)
            - Windows Executable
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
